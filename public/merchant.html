<!DOCTYPE html>
<html lang="zh-CN">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#0f172a">
  <title>商家操作 - 等候管理</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html,
    body {
      background: #0f172a;
    }

    .bg-screen {
      position: fixed;
      top: -50px;
      left: -50px;
      right: -50px;
      bottom: -50px;
      background: linear-gradient(135deg, #0f172a 0%, #1e293b 50%, #0f172a 100%);
      z-index: -1;
    }

    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      min-height: 100vh;
      color: #f1f5f9;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 24px 16px;
      padding-top: max(24px, env(safe-area-inset-top));
      padding-bottom: max(24px, env(safe-area-inset-bottom));
    }

    .header {
      text-align: center;
      margin-bottom: 32px;
    }

    .header h1 {
      font-size: 1.5rem;
      font-weight: 800;
      background: linear-gradient(135deg, #f97316, #fb923c);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      letter-spacing: -0.02em;
    }

    .header p {
      color: #94a3b8;
      font-size: 0.85rem;
      margin-top: 4px;
    }

    .status-card {
      background: rgba(255, 255, 255, 0.05);
      backdrop-filter: blur(20px);
      border: 1px solid rgba(255, 255, 255, 0.08);
      border-radius: 20px;
      padding: 32px;
      text-align: center;
      width: 100%;
      max-width: 400px;
      margin-bottom: 28px;
    }

    .count-label {
      font-size: 0.85rem;
      color: #94a3b8;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      margin-bottom: 8px;
    }

    .count-value {
      font-size: 5rem;
      font-weight: 800;
      line-height: 1;
      background: linear-gradient(135deg, #38bdf8, #818cf8);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      transition: transform 0.2s ease;
    }

    .count-value.bump {
      transform: scale(1.1);
    }

    .wait-info {
      margin-top: 12px;
      font-size: 1rem;
      color: #64748b;
    }

    .wait-info span {
      color: #fbbf24;
      font-weight: 600;
    }

    .section-title {
      font-size: 0.75rem;
      color: #64748b;
      text-transform: uppercase;
      letter-spacing: 0.12em;
      margin-bottom: 12px;
      width: 100%;
      max-width: 400px;
    }

    .btn-group {
      display: flex;
      gap: 12px;
      width: 100%;
      max-width: 400px;
      margin-bottom: 24px;
    }

    .btn {
      flex: 1;
      border: none;
      border-radius: 14px;
      padding: 20px 12px;
      font-size: 1.2rem;
      font-weight: 700;
      font-family: inherit;
      cursor: pointer;
      transition: all 0.2s ease;
      position: relative;
      overflow: hidden;
    }

    .btn:active {
      transform: scale(0.95);
    }

    .btn-add {
      background: linear-gradient(135deg, #f97316, #ea580c);
      color: #fff;
      box-shadow: 0 4px 20px rgba(249, 115, 22, 0.3);
    }

    .btn-add:hover {
      box-shadow: 0 6px 28px rgba(249, 115, 22, 0.45);
      transform: translateY(-1px);
    }

    .btn-add:active {
      transform: scale(0.95) translateY(0);
    }

    .btn-complete {
      background: linear-gradient(135deg, #22c55e, #16a34a);
      color: #fff;
      box-shadow: 0 4px 20px rgba(34, 197, 94, 0.3);
    }

    .btn-complete:hover {
      box-shadow: 0 6px 28px rgba(34, 197, 94, 0.45);
      transform: translateY(-1px);
    }

    .btn-reset {
      background: rgba(255, 255, 255, 0.06);
      border: 1px solid rgba(255, 255, 255, 0.1);
      color: #94a3b8;
    }

    .btn-reset:hover {
      background: rgba(239, 68, 68, 0.15);
      border-color: rgba(239, 68, 68, 0.3);
      color: #f87171;
    }

    .action-row {
      display: flex;
      gap: 12px;
      width: 100%;
      max-width: 400px;
      margin-bottom: 16px;
    }

    .toast {
      position: fixed;
      bottom: 32px;
      left: 50%;
      transform: translateX(-50%) translateY(80px);
      background: rgba(30, 41, 59, 0.95);
      backdrop-filter: blur(12px);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 12px;
      padding: 12px 24px;
      font-size: 0.9rem;
      color: #e2e8f0;
      opacity: 0;
      transition: all 0.35s cubic-bezier(0.22, 1, 0.36, 1);
      z-index: 100;
      pointer-events: none;
    }

    .toast.show {
      opacity: 1;
      transform: translateX(-50%) translateY(0);
    }

    .last-update {
      margin-top: 16px;
      font-size: 0.75rem;
      color: #475569;
    }

    .settings-card {
      background: rgba(255, 255, 255, 0.04);
      backdrop-filter: blur(20px);
      border: 1px solid rgba(255, 255, 255, 0.06);
      border-radius: 16px;
      padding: 20px 24px;
      width: 100%;
      max-width: 400px;
      margin-top: 24px;
    }

    .setting-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 12px 0;
    }

    .setting-row+.setting-row {
      border-top: 1px solid rgba(255, 255, 255, 0.06);
    }

    .setting-label {
      font-size: 0.9rem;
      color: #cbd5e1;
    }

    .setting-label small {
      display: block;
      font-size: 0.7rem;
      color: #64748b;
      margin-top: 2px;
    }

    /* Toggle switch */
    .toggle {
      position: relative;
      width: 50px;
      height: 28px;
      flex-shrink: 0;
    }

    .toggle input {
      opacity: 0;
      width: 0;
      height: 0;
    }

    .toggle-track {
      position: absolute;
      cursor: pointer;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: rgba(255, 255, 255, 0.1);
      border-radius: 28px;
      transition: background 0.3s;
    }

    .toggle-track:before {
      content: '';
      position: absolute;
      width: 22px;
      height: 22px;
      left: 3px;
      bottom: 3px;
      background: #94a3b8;
      border-radius: 50%;
      transition: all 0.3s;
    }

    .toggle input:checked+.toggle-track {
      background: rgba(34, 197, 94, 0.4);
    }

    .toggle input:checked+.toggle-track:before {
      transform: translateX(22px);
      background: #22c55e;
    }

    /* Stepper */
    .stepper {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .stepper-btn {
      width: 32px;
      height: 32px;
      border-radius: 8px;
      border: 1px solid rgba(255, 255, 255, 0.12);
      background: rgba(255, 255, 255, 0.06);
      color: #e2e8f0;
      font-size: 1.1rem;
      font-weight: 700;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.15s;
      font-family: inherit;
    }

    .stepper-btn:active {
      transform: scale(0.9);
    }

    .stepper-value {
      width: 50px;
      text-align: center;
      font-size: 1rem;
      font-weight: 700;
      color: #fbbf24;
    }

    .stepper-unit {
      font-size: 0.75rem;
      color: #64748b;
    }
  </style>
</head>

<body>
  <div class="bg-screen"></div>
  <div class="header">
    <h1>🍳 商家操作台</h1>
    <p>点单后按份数录入</p>
  </div>

  <div class="status-card">
    <div class="count-label">当前排队份数</div>
    <div class="count-value" id="countDisplay">0</div>
    <div class="wait-info">预计等待 <span id="waitDisplay">0</span> 分钟</div>
  </div>

  <div class="section-title">录入新订单</div>
  <div class="btn-group">
    <button class="btn btn-add" onclick="addCount(1)">+1份</button>
    <button class="btn btn-add" onclick="addCount(2)">+2份</button>
    <button class="btn btn-add" onclick="addCount(5)">+5份</button>
  </div>

  <div class="section-title">操作</div>
  <div class="action-row">
    <button class="btn btn-complete" style="flex:2" onclick="completeOne()">✅ 完成1份</button>
    <button class="btn btn-reset" style="flex:1" onclick="resetQueue()">清零</button>
  </div>

  <div class="last-update" id="lastUpdate"></div>

  <div class="section-title" style="margin-top:24px">设置</div>
  <div class="settings-card">
    <div class="setting-row">
      <div class="setting-label">自动销单<small>按照「每份等待时长」自动减少</small></div>
      <label class="toggle">
        <input type="checkbox" id="autoToggle" onchange="toggleAutoComplete()">
        <span class="toggle-track"></span>
      </label>
    </div>
    <div class="setting-row">
      <div class="setting-label">前端显示+1<small>让顾客和显示屏看到排队+1且时间增加</small></div>
      <label class="toggle">
        <input type="checkbox" id="plusOneToggle" onchange="togglePlusOne()">
        <span class="toggle-track"></span>
      </label>
    </div>
    <div class="setting-row">
      <div class="setting-label">高峰时段界限<small>大于等于该时间将显示红色警告</small></div>
      <div class="stepper">
        <button class="stepper-btn" onclick="changePeakMinutes(-1)">−</button>
        <span class="stepper-value" id="peakMinutesValue">10</span>
        <button class="stepper-btn" onclick="changePeakMinutes(1)">+</button>
        <span class="stepper-unit">分钟</span>
      </div>
    </div>
    <div class="setting-row">
      <div class="setting-label">每份等待时长</div>
      <div class="stepper">
        <button class="stepper-btn" onclick="changeMinutes(-1)">−</button>
        <span class="stepper-value" id="minutesValue">3</span>
        <button class="stepper-btn" onclick="changeMinutes(1)">+</button>
        <span class="stepper-unit">分钟</span>
      </div>
    </div>
  </div>

  <div class="toast" id="toast"></div>

  <script>
    const countDisplay = document.getElementById('countDisplay');
    const waitDisplay = document.getElementById('waitDisplay');
    const lastUpdate = document.getElementById('lastUpdate');
    const toastEl = document.getElementById('toast');
    const autoToggle = document.getElementById('autoToggle');
    const plusOneToggle = document.getElementById('plusOneToggle');
    const minutesValue = document.getElementById('minutesValue');
    const peakMinutesValue = document.getElementById('peakMinutesValue');

    let toastTimer;
    let currentMinutes = 3;
    let currentPeakMinutes = 10;

    function showToast(msg) {
      toastEl.textContent = msg;
      toastEl.classList.add('show');
      clearTimeout(toastTimer);
      toastTimer = setTimeout(() => toastEl.classList.remove('show'), 2000);
    }

    function updateUI(data) {
      countDisplay.textContent = data.count;
      waitDisplay.textContent = data.waitMinutes;
      lastUpdate.textContent = '更新于 ' + new Date().toLocaleTimeString('zh-CN');

      // 同步设置状态
      if (data.minutesPerPortion !== undefined) {
        currentMinutes = data.minutesPerPortion;
        minutesValue.textContent = currentMinutes;
      }
      if (data.peakMinutes !== undefined) {
        currentPeakMinutes = data.peakMinutes;
        peakMinutesValue.textContent = currentPeakMinutes;
      }
      if (data.autoComplete !== undefined) {
        autoToggle.checked = data.autoComplete;
      }
      if (data.plusOneDisplay !== undefined) {
        plusOneToggle.checked = data.plusOneDisplay;
      }

      countDisplay.classList.add('bump');
      setTimeout(() => countDisplay.classList.remove('bump'), 200);
    }

    async function fetchQueue() {
      try {
        const res = await fetch('/api/queue');
        const data = await res.json();
        updateUI(data);
      } catch (e) {
        console.error('获取数据失败', e);
      }
    }

    async function addCount(n) {
      try {
        const res = await fetch('/api/queue/add', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ count: n })
        });
        const data = await res.json();
        updateUI(data);
        showToast(`已添加 ${n} 份`);
      } catch (e) {
        showToast('操作失败');
      }
    }

    async function completeOne() {
      try {
        const res = await fetch('/api/queue/complete', { method: 'POST' });
        const data = await res.json();
        updateUI(data);
        showToast('已完成 1 份');
      } catch (e) {
        showToast('操作失败');
      }
    }

    async function resetQueue() {
      if (!confirm('确定清零所有排队份数？')) return;
      try {
        const res = await fetch('/api/queue/reset', { method: 'POST' });
        const data = await res.json();
        updateUI(data);
        showToast('已清零');
      } catch (e) {
        showToast('操作失败');
      }
    }

    async function toggleAutoComplete() {
      try {
        const res = await fetch('/api/settings/auto-complete', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ enabled: autoToggle.checked })
        });
        const data = await res.json();
        updateUI(data);
        showToast(data.autoComplete ? '自动销单已开启' : '自动销单已关闭');
      } catch (e) {
        showToast('操作失败');
      }
    }

    async function togglePlusOne() {
      try {
        const res = await fetch('/api/settings/plus-one', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ enabled: plusOneToggle.checked })
        });
        const data = await res.json();
        updateUI(data);
        showToast(data.plusOneDisplay ? '显示+1已开启' : '显示+1已关闭');
      } catch (e) {
        showToast('操作失败');
      }
    }

    async function togglePlusOne() {
      try {
        const res = await fetch('/api/settings/plus-one', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ enabled: plusOneToggle.checked })
        });
        const data = await res.json();
        updateUI(data);
        showToast(data.plusOneDisplay ? '显示+1已开启' : '显示+1已关闭');
      } catch (e) {
        showToast('操作失败');
      }
    }

    async function changeMinutes(delta) {
      const newVal = currentMinutes + delta;
      if (newVal < 1 || newVal > 30) return;
      try {
        const res = await fetch('/api/settings/minutes', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ minutes: newVal })
        });
        const data = await res.json();
        updateUI(data);
        showToast(`每份等待 ${data.minutesPerPortion} 分钟`);
      } catch (e) {
        showToast('操作失败');
      }
    }

    async function changePeakMinutes(delta) {
      const newVal = currentPeakMinutes + delta;
      if (newVal < 1 || newVal > 120) return;
      try {
        const res = await fetch('/api/settings/peak-minutes', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ minutes: newVal })
        });
        const data = await res.json();
        updateUI(data);
        showToast(`高峰界限已设为 ${data.peakMinutes} 分钟`);
      } catch (e) {
        showToast('操作失败');
      }
    }

    // 初始加载 + 每5秒刷新
    fetchQueue();
    setInterval(fetchQueue, 5000);
  </script>
</body>

</html>
