<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta name="theme-color" content="#0c0a1a">
    <title>红星螺蛳粉</title>
    <!-- 图标与分享 Meta 标签 -->
    <link rel="icon" href="/favicon.ico?v=2">
    <link rel="apple-touch-icon" href="/favicon.ico?v=2">

    <!-- 微信/社交媒体分享卡片信息 -->
    <meta property="og:title" content="红星螺蛳粉">
    <meta property="og:description" content="查看预计等候时间">
    <!-- ⚠️注意：微信分享抓取卡片图片时，强制要求绝对路径。请将下面的YOUR_DOMAIN换成你的实际域名（如 https://www.example.com）。不支持 JS 动态生成。 -->
    <!-- <meta property="og:image" content="https://YOUR_DOMAIN/hx.jpeg">
    <meta property="og:type" content="website"> -->

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html,
        body {
            background: #0c0a1a;
        }

        .bg-screen {
            position: fixed;
            top: -50px;
            left: -50px;
            right: -50px;
            bottom: -50px;
            background: linear-gradient(135deg, #0c0a1a 0%, #1a1035 40%, #0f172a 100%);
            z-index: -2;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            min-height: 100vh;
            color: #f1f5f9;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 24px 16px;
            padding-top: max(24px, env(safe-area-inset-top));
            padding-bottom: max(24px, env(safe-area-inset-bottom));
            overflow: hidden;
        }

        .bg-circle {
            position: fixed;
            border-radius: 50%;
            filter: blur(80px);
            opacity: 0.15;
            z-index: 0;
            animation: float 8s ease-in-out infinite;
        }

        .bg-circle:nth-child(1) {
            width: 300px;
            height: 300px;
            background: #f97316;
            top: -80px;
            left: -60px;
        }

        .bg-circle:nth-child(2) {
            width: 250px;
            height: 250px;
            background: #818cf8;
            bottom: -60px;
            right: -40px;
            animation-delay: -3s;
        }

        .bg-circle:nth-child(3) {
            width: 200px;
            height: 200px;
            background: #38bdf8;
            top: 40%;
            left: 60%;
            animation-delay: -5s;
        }

        @keyframes float {

            0%,
            100% {
                transform: translateY(0) scale(1);
            }

            50% {
                transform: translateY(-30px) scale(1.05);
            }
        }

        .container {
            position: relative;
            z-index: 1;
            text-align: center;
            max-width: 420px;
            width: 100%;
        }

        .shop-name {
            font-size: clamp(1.5rem, 4vw, 3.5rem);
            color: #94a3b8;
            margin-bottom: clamp(24px, 5vh, 60px);
            letter-spacing: 0.05em;
        }

        .wait-card {
            background: rgba(255, 255, 255, 0.04);
            backdrop-filter: blur(24px);
            border: 1px solid rgba(255, 255, 255, 0.06);
            border-radius: 32px;
            padding: 24px 24px;
            width: 100%;
            margin-bottom: 0px;
            /* Removed margin so it aligns to bottom exactly */
            box-shadow: 0 24px 48px -12px rgba(0, 0, 0, 0.5), inset 0 1px 0 rgba(255, 255, 255, 0.1);
            position: relative;
            overflow: hidden;
            flex-grow: 1;
            /* Allow it to fill the space in the flex container if needed, or we can just justify-space-between */
            margin-top: clamp(24px, 5vh, 60px);
            /* Add spacing above it so it doesn't collide with status badge if screen is small */
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        .wait-label {
            font-size: clamp(1.2rem, 3vw, 2.5rem);
            color: #94a3b8;
            text-transform: uppercase;
            letter-spacing: 0.15em;
            margin-bottom: 24px;
        }

        .wait-time {
            font-size: clamp(6rem, 20vw, 18rem);
            font-weight: 800;
            line-height: 1;
            background: linear-gradient(135deg, #fbbf24, #f97316, #ef4444);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 8px;
            transition: transform 0.3s cubic-bezier(0.22, 1, 0.36, 1);
        }

        .wait-time.pulse {
            animation: pulse 0.6s ease;
        }

        @keyframes pulse {
            0% {
                transform: scale(1);
            }

            30% {
                transform: scale(1.06);
            }

            100% {
                transform: scale(1);
            }
        }

        .wait-unit {
            font-size: clamp(2rem, 5vw, 4rem);
            font-weight: 600;
            color: #94a3b8;
        }

        .portions-info {
            margin-top: clamp(24px, 4vh, 40px);
            padding-top: clamp(20px, 3vh, 32px);
            border-top: 1px solid rgba(255, 255, 255, 0.06);
            font-size: clamp(1.2rem, 3vw, 2.5rem);
            color: #64748b;
        }

        .portions-info span {
            color: #38bdf8;
            font-weight: 700;
            font-size: clamp(1.5rem, 4vw, 3.5rem);
        }

        .status-badge {
            display: inline-flex;
            align-items: center;
            align-self: center;
            /* Prevent stretching to full width of column */
            gap: 6px;
            background: rgba(34, 197, 94, 0.12);
            border: 1px solid rgba(34, 197, 94, 0.2);
            border-radius: 100px;
            padding: clamp(12px, 2vw, 24px) clamp(24px, 4vw, 48px);
            font-size: clamp(1.2rem, 2.5vw, 2.5rem);
            color: #4ade80;
            margin-bottom: 0px;
            /* Removed margin so it aligns to top exactly */
        }

        .status-badge.busy {
            background: rgba(249, 115, 22, 0.12);
            border-color: rgba(249, 115, 22, 0.2);
            color: #fb923c;
        }

        .status-badge.very-busy {
            background: rgba(239, 68, 68, 0.12);
            border-color: rgba(239, 68, 68, 0.2);
            color: #f87171;
        }

        .status-dot {
            width: 6px;
            height: 6px;
            border-radius: 50%;
            background: currentColor;
            animation: blink 1.5s ease-in-out infinite;
        }

        @keyframes blink {

            0%,
            100% {
                opacity: 1;
            }

            50% {
                opacity: 0.3;
            }
        }

        /* Layout extensions for QR code */

        .layout-wrapper {
            display: flex;
            flex-direction: row;
            align-items: stretch;
            /* Make both columns the same height */
            justify-content: center;
            gap: 8vw;
            width: 100%;
            max-width: 1800px;
            position: relative;
            z-index: 1;
            flex-wrap: wrap;
            padding: 40px;
        }

        .container {
            margin: 0;
            width: 100%;
            max-width: 800px;
            flex: 1 1 500px;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            /* Push status badge to top, wait-card to bottom */
        }

        .qr-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            /* Center content vertically within the stretched box */
            background: rgba(255, 255, 255, 0.04);
            backdrop-filter: blur(24px);
            border: 1px solid rgba(255, 255, 255, 0.06);
            border-radius: 36px;
            padding: clamp(40px, 6vw, 80px) clamp(32px, 6vw, 64px);
            flex: 1 1 500px;
            max-width: 800px;
        }

        .qr-image {
            width: clamp(250px, 30vw, 450px);
            height: clamp(250px, 30vw, 450px);
            border-radius: 20px;
            margin-bottom: clamp(16px, 3vh, 32px);
            box-shadow: 0 12px 48px rgba(0, 0, 0, 0.3);
            border: 4px solid rgba(255, 255, 255, 0.1);
        }

        .qr-hint {
            font-size: clamp(1.2rem, 3vw, 2.5rem);
            color: #e2e8f0;
            font-weight: 600;
            letter-spacing: 0.05em;
            text-shadow: 0 4px 12px rgba(0, 0, 0, 0.5);
        }
    </style>
</head>

<body>
    <div class="bg-screen"></div>
    <div class="bg-circle"></div>
    <div class="bg-circle"></div>
    <div class="bg-circle"></div>

    <div class="layout-wrapper">
        <div class="container">
            <div id="statusBadge" class="status-badge">
                <div class="status-dot"></div>
                <span id="statusText">加载中</span>
            </div>

            <div class="wait-card">
                <div class="wait-label">预计还需等待</div>
                <div id="waitContent">
                    <div class="wait-time" id="waitTime">-</div>
                    <div class="wait-unit">分钟</div>
                </div>
                <div class="portions-info">
                    当前排队 <span id="portionCount">-</span> 份
                </div>
            </div>
        </div>

        <div class="qr-container">
            <img src="/order.png" alt="点餐二维码" class="qr-image" />
            <div class="qr-hint">欢迎微信扫码点餐</div>
        </div>
    </div>

    <script>
        const waitTimeEl = document.getElementById('waitTime');
        const portionCountEl = document.getElementById('portionCount');
        const statusBadge = document.getElementById('statusBadge');
        const statusText = document.getElementById('statusText');

        function updateStatus(count, minutes, peakMinutes = 10, plusOneDisplay = false, minutesPerPortion = 3) {
            let displayCount = plusOneDisplay ? count + 1 : count;
            let displayMinutes = plusOneDisplay ? minutes + minutesPerPortion : minutes;

            portionCountEl.textContent = displayCount;
            waitTimeEl.textContent = displayMinutes;

            if (displayMinutes < peakMinutes / 2) {
                statusBadge.className = 'status-badge';
                statusText.textContent = '稍作等候';
            } else if (displayMinutes < peakMinutes) {
                statusBadge.className = 'status-badge busy';
                statusText.textContent = '略有繁忙';
            } else {
                statusBadge.className = 'status-badge very-busy';
                statusText.textContent = '高峰时段';
            }

            // pulse animation
            waitTimeEl.classList.remove('pulse');
            void waitTimeEl.offsetWidth;
            waitTimeEl.classList.add('pulse');
        }

        async function fetchQueue() {
            try {
                const res = await fetch('/api/queue');
                const data = await res.json();
                updateStatus(data.count, data.waitMinutes, data.peakMinutes, data.plusOneDisplay, data.minutesPerPortion);
            } catch (e) {
                console.error('获取数据失败', e);
            }
        }

        // 初始加载
        fetchQueue();

        // 每 5 秒刷新等待时间
        setInterval(fetchQueue, 5000);
    </script>
</body>

</html>
