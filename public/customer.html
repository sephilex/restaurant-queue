<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta name="theme-color" content="#0c0a1a">
    <title>红星螺蛳粉</title>
    <!-- 图标与分享 Meta 标签 -->
    <link rel="icon" href="/favicon.ico?v=2">
    <link rel="apple-touch-icon" href="/favicon.ico?v=2">

    <!-- 微信/社交媒体分享卡片信息 -->
    <meta property="og:title" content="红星螺蛳粉">
    <meta property="og:description" content="查看预计等候时间">
    <!-- ⚠️注意：微信分享抓取卡片图片时，强制要求绝对路径。请将下面的YOUR_DOMAIN换成你的实际域名（如 https://www.example.com）。不支持 JS 动态生成。 -->
    <!-- <meta property="og:image" content="https://YOUR_DOMAIN/hx.jpeg">
    <meta property="og:type" content="website"> -->

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html,
        body {
            background: #0c0a1a;
        }

        .bg-screen {
            position: fixed;
            top: -50px;
            left: -50px;
            right: -50px;
            bottom: -50px;
            background: linear-gradient(135deg, #0c0a1a 0%, #1a1035 40%, #0f172a 100%);
            z-index: -2;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            min-height: 100vh;
            color: #f1f5f9;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 24px 16px;
            padding-top: max(24px, env(safe-area-inset-top));
            padding-bottom: max(24px, env(safe-area-inset-bottom));
        }

        .bg-circle {
            position: fixed;
            border-radius: 50%;
            filter: blur(80px);
            opacity: 0.15;
            z-index: 0;
            animation: float 8s ease-in-out infinite;
        }

        .bg-circle:nth-child(1) {
            width: 300px;
            height: 300px;
            background: #f97316;
            top: -80px;
            left: -60px;
        }

        .bg-circle:nth-child(2) {
            width: 250px;
            height: 250px;
            background: #818cf8;
            bottom: -60px;
            right: -40px;
            animation-delay: -3s;
        }

        .bg-circle:nth-child(3) {
            width: 200px;
            height: 200px;
            background: #38bdf8;
            top: 40%;
            left: 60%;
            animation-delay: -5s;
        }

        @keyframes float {

            0%,
            100% {
                transform: translateY(0) scale(1);
            }

            50% {
                transform: translateY(-30px) scale(1.05);
            }
        }

        .container {
            position: relative;
            z-index: 1;
            text-align: center;
            max-width: 420px;
            width: 100%;
        }

        .shop-name {
            font-size: 1.25rem;
            color: #94a3b8;
            font-weight: 500;
            letter-spacing: 0.1em;
            margin-bottom: 12px;
        }

        .status-badge-container {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
        }

        .wait-card {
            background: rgba(255, 255, 255, 0.04);
            backdrop-filter: blur(24px);
            border: 1px solid rgba(255, 255, 255, 0.06);
            border-radius: 32px;
            padding: 24px 24px;
            width: 100%;
            margin-bottom: 24px;
            box-shadow: 0 24px 48px -12px rgba(0, 0, 0, 0.5), inset 0 1px 0 rgba(255, 255, 255, 0.1);
            position: relative;
            overflow: hidden;
        }

        .wait-label {
            font-size: 0.85rem;
            color: #94a3b8;
            text-transform: uppercase;
            letter-spacing: 0.15em;
            margin-bottom: 16px;
        }

        .wait-time {
            font-size: 6rem;
            font-weight: 800;
            line-height: 1;
            background: linear-gradient(135deg, #fbbf24, #f97316, #ef4444);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 8px;
            transition: transform 0.3s cubic-bezier(0.22, 1, 0.36, 1);
        }

        .wait-time.pulse {
            animation: pulse 0.6s ease;
        }

        @keyframes pulse {
            0% {
                transform: scale(1);
            }

            30% {
                transform: scale(1.06);
            }

            100% {
                transform: scale(1);
            }
        }

        .wait-unit {
            font-size: 1.5rem;
            font-weight: 600;
            color: #94a3b8;
        }

        .portions-info {
            margin-top: 16px;
            padding-top: 16px;
            border-top: 1px solid rgba(255, 255, 255, 0.06);
            font-size: 0.9rem;
            color: #64748b;
        }

        .portions-info span {
            color: #38bdf8;
            font-weight: 700;
            font-size: 1.1rem;
        }

        .status-badge {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            background: rgba(34, 197, 94, 0.12);
            border: 1px solid rgba(34, 197, 94, 0.2);
            border-radius: 100px;
            padding: 8px 18px;
            font-size: 0.8rem;
            color: #4ade80;
            margin-bottom: 20px;
        }

        .status-badge.busy {
            background: rgba(249, 115, 22, 0.12);
            border-color: rgba(249, 115, 22, 0.2);
            color: #fb923c;
        }

        .status-badge.very-busy {
            background: rgba(239, 68, 68, 0.12);
            border-color: rgba(239, 68, 68, 0.2);
            color: #f87171;
        }

        .status-dot {
            width: 6px;
            height: 6px;
            border-radius: 50%;
            background: currentColor;
            animation: blink 1.5s ease-in-out infinite;
        }

        @keyframes blink {

            0%,
            100% {
                opacity: 1;
            }

            50% {
                opacity: 0.3;
            }
        }

        /* 跳转提示 & 继续点餐按钮 (已移除旧版逻辑) */

        /* 二维码展示区 */
        .qr-section {
            background: rgba(255, 255, 255, 0.04);
            backdrop-filter: blur(24px);
            border: 1px solid rgba(255, 255, 255, 0.06);
            border-radius: 28px;
            padding: 24px 24px;
            margin-bottom: 16px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .qr-image {
            width: 150px;
            height: 150px;
            border-radius: 16px;
            margin-bottom: 12px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.2);
            border: 2px solid rgba(255, 255, 255, 0.1);
            -webkit-touch-callout: none;
            -webkit-user-select: none;
            user-select: none;
        }

        .qr-hint {
            font-size: 1rem;
            color: #e2e8f0;
            font-weight: 600;
            letter-spacing: 0.05em;
        }

        .qr-hint-sub {
            font-size: 0.8rem;
            color: #94a3b8;
            margin-top: 4px;
        }
    </style>
</head>

<body>
    <div class="bg-screen"></div>
    <div class="bg-circle"></div>
    <div class="bg-circle"></div>
    <div class="bg-circle"></div>

    <div class="container">
        <div class="shop-name">🍽️ 红星螺蛳粉</div>

        <div id="statusBadge" class="status-badge">
            <div class="status-dot"></div>
            <span id="statusText">加载中</span>
        </div>

        <div class="wait-card">
            <div class="wait-label">预计还需等待</div>
            <div id="waitContent">
                <div class="wait-time" id="waitTime">-</div>
                <div class="wait-unit">分钟</div>
            </div>
            <div class="portions-info">
                当前排队 <span id="portionCount">-</span> 份
            </div>
        </div>

        <div class="qr-section">
            <img src="/order.png" alt="点餐二维码" class="qr-image" />
            <div class="qr-hint">识别二维码点餐</div>
            <div class="qr-hint-sub">微信内长按图片即可识别</div>
        </div>
    </div>

    <script>
        const waitTimeEl = document.getElementById('waitTime');
        const portionCountEl = document.getElementById('portionCount');
        const statusBadge = document.getElementById('statusBadge');
        const statusText = document.getElementById('statusText');

        function updateStatus(count, minutes, peakMinutes = 10, plusOneDisplay = false, minutesPerPortion = 3) {
            let displayCount = plusOneDisplay ? count + 1 : count;
            let displayMinutes = plusOneDisplay ? minutes + minutesPerPortion : minutes;

            portionCountEl.textContent = displayCount;
            waitTimeEl.textContent = displayMinutes;

            if (displayMinutes < peakMinutes / 2) {
                statusBadge.className = 'status-badge';
                statusText.textContent = '稍作等候';
            } else if (displayMinutes < peakMinutes) {
                statusBadge.className = 'status-badge busy';
                statusText.textContent = '略有繁忙';
            } else {
                statusBadge.className = 'status-badge very-busy';
                statusText.textContent = '高峰时段';
            }

            // pulse animation
            waitTimeEl.classList.remove('pulse');
            void waitTimeEl.offsetWidth;
            waitTimeEl.classList.add('pulse');
        }

        async function fetchQueue() {
            try {
                const res = await fetch('/api/queue');
                const data = await res.json();
                updateStatus(data.count, data.waitMinutes, data.peakMinutes, data.plusOneDisplay, data.minutesPerPortion);
            } catch (e) {
                console.error('获取数据失败', e);
            }
        }

        // 初始加载
        fetchQueue();

        // 每 5 秒刷新等待时间
        setInterval(fetchQueue, 5000);
    </script>
</body>

</html>
